name: Déploiement

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Déploiement sur ${{ github.ref_name == 'main' && 'Production' || 'Test' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -t ed25519 "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts
          unset SSH_AUTH_SOCK || true

      - name: Sélection du chemin de déploiement
        id: path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "deploy_path=${{ secrets.DEPLOY_PATH_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=${{ secrets.DEPLOY_PATH_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Synchronisation via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='*.env' \
            --exclude='.env*' \
            --exclude='config/.admin_password' \
            --exclude='config/config.php' \
            --exclude='config/database.php' \
            --exclude='node_modules/' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ steps.path.outputs.deploy_path }}"

      - name: Initialisation de la configuration (première installation)
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "[ -f '${{ steps.path.outputs.deploy_path }}/config/config.php' ] || cp '${{ steps.path.outputs.deploy_path }}/config/config.example.php' '${{ steps.path.outputs.deploy_path }}/config/config.php'; \
             [ -f '${{ steps.path.outputs.deploy_path }}/config/database.php' ] || cp '${{ steps.path.outputs.deploy_path }}/config/database.example.php' '${{ steps.path.outputs.deploy_path }}/config/database.php'"

      - name: Notification de déploiement
        run: |
          echo "✅ Déploiement réussi sur ${{ github.ref_name == 'main' && 'PRODUCTION' || 'TEST' }} (${{ steps.path.outputs.deploy_path }})"
