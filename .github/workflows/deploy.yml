name: Déploiement

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Déploiement sur ${{ github.ref_name == 'main' && 'Production' || 'Test' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sélection du chemin de déploiement
        id: path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "deploy_path=${{ secrets.DEPLOY_PATH_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=${{ secrets.DEPLOY_PATH_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Synchronisation via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='*.env' \
            --exclude='.env*' \
            --exclude='config/.admin_password' \
            --exclude='node_modules/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ steps.path.outputs.deploy_path }}"

      - name: Notification de déploiement
        run: |
          echo "✅ Déploiement réussi sur ${{ github.ref_name == 'main' && 'PRODUCTION' || 'TEST' }} (${{ steps.path.outputs.deploy_path }})"
